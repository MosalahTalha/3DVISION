<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم - برق بنزين</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #111111;
      --bg-tertiary: #1a1a1a;
      --gold: #e2b04a;
      --gold-light: #f5d89a;
      --text-primary: #ffffff;
      --text-secondary: rgba(255,255,255,0.7);
      --text-muted: rgba(255,255,255,0.4);
      --border: rgba(255,255,255,0.08);
      --danger: #ef4444;
      --success: #22c55e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-secondary); }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }
    .gold-text {
      background: linear-gradient(135deg, #e2b04a 0%, #f5d89a 50%, #e2b04a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .gold-border { border-color: var(--gold) !important; }
    .gold-bg { background-color: var(--gold); }
    .gold-bg:hover { background-color: var(--gold-light); }

    /* Login */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }
    .shake { animation: shake 0.6s ease-in-out; }

    /* Toast */
    @keyframes slideDown {
      from { transform: translateY(-100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translateY(0); opacity: 1; }
      to { transform: translateY(-100%); opacity: 0; }
    }
    .toast-in { animation: slideDown 0.3s ease-out; }
    .toast-out { animation: slideUp 0.3s ease-in forwards; }

    /* Modal */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes scaleIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .modal-overlay { animation: fadeIn 0.2s ease-out; }
    .modal-content { animation: scaleIn 0.2s ease-out; }

    /* Sidebar */
    .sidebar { width: 260px; transition: transform 0.3s ease; }
    @media (max-width: 768px) {
      .sidebar { position: fixed; z-index: 50; transform: translateX(100%); }
      .sidebar.open { transform: translateX(0); }
    }

    /* Input styling */
    .admin-input {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .admin-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(226, 176, 74, 0.15);
    }
    .admin-input::placeholder { color: var(--text-muted); }
    .admin-textarea {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      resize: vertical;
      min-height: 80px;
    }
    .admin-textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(226, 176, 74, 0.15);
    }
    .admin-select {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      cursor: pointer;
    }
    .admin-select:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(226, 176, 74, 0.15);
    }
    .admin-select option { background: var(--bg-secondary); color: var(--text-primary); }

    /* Table */
    .admin-table { width: 100%; border-collapse: separate; border-spacing: 0; }
    .admin-table thead th {
      background: var(--bg-tertiary);
      padding: 12px 16px;
      text-align: right;
      font-weight: 600;
      font-size: 13px;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
    }
    .admin-table tbody tr { transition: background 0.15s; }
    .admin-table tbody tr:nth-child(even) { background: rgba(255,255,255,0.02); }
    .admin-table tbody tr:hover { background: rgba(255,255,255,0.04); }
    .admin-table tbody td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      vertical-align: middle;
    }

    /* Toggle switch */
    .toggle-switch { position: relative; width: 48px; height: 26px; cursor: pointer; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 26px;
      transition: 0.3s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      height: 20px; width: 20px;
      right: 2px; bottom: 2px;
      background: var(--text-muted);
      border-radius: 50%;
      transition: 0.3s;
    }
    .toggle-switch input:checked + .toggle-slider { background: var(--gold); border-color: var(--gold); }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(-22px); background: var(--bg-primary); }

    /* Card */
    .admin-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      transition: border-color 0.2s, transform 0.2s;
    }
    .admin-card:hover { border-color: rgba(226, 176, 74, 0.2); }

    /* Stat card */
    .stat-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: border-color 0.2s, transform 0.2s;
    }
    .stat-card:hover { border-color: rgba(226, 176, 74, 0.3); transform: translateY(-2px); }

    /* Bar chart */
    .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 200px; padding: 0 8px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; justify-content: flex-end; }
    .bar {
      width: 100%; max-width: 40px;
      background: linear-gradient(to top, var(--gold), var(--gold-light));
      border-radius: 4px 4px 0 0;
      transition: height 0.5s ease;
      min-height: 2px;
    }
    .bar-label { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
    .bar-value { font-size: 12px; color: var(--text-secondary); font-weight: 600; }

    /* Nav item */
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; border-radius: 8px;
      cursor: pointer; transition: all 0.2s;
      color: var(--text-secondary); font-size: 14px; font-weight: 500;
    }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }
    .nav-item.active { background: rgba(226, 176, 74, 0.1); color: var(--gold); }

    /* Button styles */
    .btn-gold {
      background: var(--gold);
      color: var(--bg-primary);
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-gold:hover { background: var(--gold-light); transform: translateY(-1px); }
    .btn-outline {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-outline:hover { border-color: var(--text-secondary); color: var(--text-primary); }
    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid rgba(239,68,68,0.3);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-danger:hover { background: rgba(239,68,68,0.1); border-color: var(--danger); }
    .btn-icon {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      transition: all 0.2s;
      color: var(--text-secondary);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-icon:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
    .btn-icon.danger:hover { background: rgba(239,68,68,0.1); color: var(--danger); }

    /* Badge */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-gold { background: rgba(226,176,74,0.15); color: var(--gold); }
    .badge-green { background: rgba(34,197,94,0.15); color: var(--success); }
    .badge-gray { background: rgba(255,255,255,0.08); color: var(--text-muted); }
    .badge-red { background: rgba(239,68,68,0.15); color: var(--danger); }

    /* Promo banner preview */
    .promo-preview {
      background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
      color: var(--bg-primary);
      font-weight: 700;
      padding: 10px 0;
      overflow: hidden;
      position: relative;
      border-radius: 8px;
    }
    .promo-preview-text {
      display: inline-block;
      white-space: nowrap;
      animation: scrollText 10s linear infinite;
    }
    @keyframes scrollText {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

    /* Mobile table */
    @media (max-width: 768px) {
      .admin-table thead { display: none; }
      .admin-table tbody tr {
        display: block;
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: 10px;
        margin-bottom: 12px;
        padding: 12px;
      }
      .admin-table tbody td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 0;
        border-bottom: 1px solid var(--border);
      }
      .admin-table tbody td:last-child { border-bottom: none; }
      .admin-table tbody td::before {
        content: attr(data-label);
        font-weight: 600;
        color: var(--text-secondary);
        font-size: 12px;
      }
    }

    /* File input */
    .file-input-wrapper {
      position: relative;
      overflow: hidden;
      display: inline-block;
      cursor: pointer;
    }
    .file-input-wrapper input[type="file"] {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    /* Color input */
    input[type="color"] {
      width: 48px; height: 36px;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      background: transparent;
      padding: 2px;
    }

    /* Sidebar overlay for mobile */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 40;
    }
    @media (max-width: 768px) {
      .sidebar-overlay.show { display: block; }
    }
  </style>
</head>
<body>

<!-- Toast Container -->
<div id="toastContainer" style="position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;align-items:center;"></div>

<!-- Modal Container -->
<div id="modalContainer"></div>

<!-- LOGIN SCREEN -->
<div id="loginScreen" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg-primary);padding:20px;">
  <div style="width:100%;max-width:400px;">
    <div style="text-align:center;margin-bottom:40px;">
      <svg width="60" height="60" viewBox="0 0 60 60" fill="none" style="margin:0 auto 16px;">
        <rect width="60" height="60" rx="12" fill="url(#loginGrad)"/>
        <path d="M30 15L40 22V38L30 45L20 38V22L30 15Z" stroke="#0a0a0a" stroke-width="2.5" fill="none"/>
        <path d="M30 20L36 24V36L30 40L24 36V24L30 20Z" fill="#0a0a0a" opacity="0.3"/>
        <defs><linearGradient id="loginGrad" x1="0" y1="0" x2="60" y2="60"><stop stop-color="#e2b04a"/><stop offset="1" stop-color="#f5d89a"/></linearGradient></defs>
      </svg>
      <h1 class="gold-text" style="font-size:28px;font-weight:800;margin-bottom:4px;">برق بنزين</h1>
      <p style="color:var(--text-muted);font-size:14px;">لوحة التحكم</p>
    </div>
    <div class="admin-card" style="padding:32px;" id="loginCard">
      <h2 style="font-size:18px;font-weight:700;margin-bottom:24px;text-align:center;">تسجيل الدخول</h2>
      <div style="margin-bottom:20px;">
        <label style="display:block;font-size:13px;color:var(--text-secondary);margin-bottom:8px;">كلمة المرور</label>
        <div style="position:relative;">
          <input type="password" id="passwordInput" maxlength="6" class="admin-input" placeholder="أدخل كلمة المرور (6 أرقام)" style="padding-left:44px;text-align:center;font-size:20px;letter-spacing:8px;" onkeydown="if(event.key==='Enter')doLogin()">
          <button onclick="togglePasswordVisibility()" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px;" type="button">
            <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button onclick="doLogin()" class="btn-gold" style="width:100%;justify-content:center;padding:12px;font-size:16px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        دخول
      </button>
      <p id="loginError" style="color:var(--danger);font-size:13px;text-align:center;margin-top:12px;display:none;">كلمة المرور غير صحيحة</p>
    </div>
    <p style="text-align:center;margin-top:24px;">
      <a href="brq-benzine.html" style="color:var(--text-muted);font-size:13px;text-decoration:none;transition:color 0.2s;" onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='var(--text-muted)'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-left:4px;"><path d="M15 18l-6-6 6-6"/></svg>
        عرض الموقع
      </a>
    </p>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" style="display:none;">
  <!-- Sidebar Overlay (mobile) -->
  <div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar" style="position:fixed;top:0;right:0;bottom:0;background:var(--bg-secondary);border-left:1px solid var(--border);z-index:50;display:flex;flex-direction:column;overflow-y:auto;">
    <div style="padding:20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;">
      <svg width="36" height="36" viewBox="0 0 60 60" fill="none">
        <rect width="60" height="60" rx="12" fill="url(#sideGrad)"/>
        <path d="M30 15L40 22V38L30 45L20 38V22L30 15Z" stroke="#0a0a0a" stroke-width="2.5" fill="none"/>
        <path d="M30 20L36 24V36L30 40L24 36V24L30 20Z" fill="#0a0a0a" opacity="0.3"/>
        <defs><linearGradient id="sideGrad" x1="0" y1="0" x2="60" y2="60"><stop stop-color="#e2b04a"/><stop offset="1" stop-color="#f5d89a"/></linearGradient></defs>
      </svg>
      <div>
        <h2 class="gold-text" style="font-size:16px;font-weight:700;">لوحة التحكم</h2>
        <p style="font-size:11px;color:var(--text-muted);">برق بنزين</p>
      </div>
      <button onclick="toggleSidebar()" style="margin-right:auto;background:none;border:none;color:var(--text-muted);cursor:pointer;display:none;" class="md-hidden" id="closeSidebar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <nav style="padding:12px 10px;flex:1;display:flex;flex-direction:column;gap:2px;">
      <div class="nav-item active" onclick="navigateTo('dashboard')" data-page="dashboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        لوحة المعلومات
      </div>
      <div class="nav-item" onclick="navigateTo('settings')" data-page="settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        إعدادات الموقع
      </div>
      <div class="nav-item" onclick="navigateTo('products')" data-page="products">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        المنتجات
      </div>
      <div class="nav-item" onclick="navigateTo('categories')" data-page="categories">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        المجموعات
      </div>
      <div class="nav-item" onclick="navigateTo('contacts')" data-page="contacts">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
        التواصل
      </div>
      <div class="nav-item" onclick="navigateTo('announcements')" data-page="announcements">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        الإعلانات
      </div>
      <div class="nav-item" onclick="navigateTo('promo')" data-page="promo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
        شريط العروض
      </div>

// ==================== DATA MANAGEMENT ====================
let appData = null;

function loadData() {
  try {
    const stored = localStorage.getItem('brq_data');
    if (stored) {
      appData = JSON.parse(stored);
    } else {
      appData = getDefaultData();
      saveData();
    }
  } catch (e) {
    appData = getDefaultData();
    saveData();
  }
  return appData;
}

function saveData() {
  try {
    localStorage.setItem('brq_data', JSON.stringify(appData));
  } catch (e) {
    showToast('خطأ في حفظ البيانات', 'error');
  }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function generateId() {
  return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
}

// ==================== TOAST ====================
function showToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  const bgColor = type === 'success' ? 'rgba(34,197,94,0.95)' : type === 'error' ? 'rgba(239,68,68,0.95)' : 'rgba(226,176,74,0.95)';
  const icon = type === 'success'
    ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
    : type === 'error'
    ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
    : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
  toast.className = 'toast-in';
  toast.style.cssText = `background:${bgColor};color:white;padding:12px 20px;border-radius:10px;display:flex;align-items:center;gap:10px;font-size:14px;font-family:'Cairo',sans-serif;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,0.4);min-width:280px;justify-content:center;`;
  toast.innerHTML = icon + '<span>' + message + '</span>';
  container.appendChild(toast);
  setTimeout(() => {
    toast.className = 'toast-out';
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

// ==================== SIDEBAR & NAVIGATION ====================
let currentPage = 'dashboard';

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('show');
}

function navigateTo(page) {
  currentPage = page;
  // Hide all pages
  document.querySelectorAll('[id^="page-"]').forEach(p => p.style.display = 'none');
  // Show target page
  const target = document.getElementById('page-' + page);
  if (target) target.style.display = 'block';
  // Update nav items
  document.querySelectorAll('.nav-item[data-page]').forEach(n => {
    n.classList.toggle('active', n.dataset.page === page);
  });
  // Render page
  renderPage(page);
  // Close sidebar on mobile
  const sidebar = document.getElementById('sidebar');
  if (sidebar.classList.contains('open')) toggleSidebar();
  // Scroll to top
  window.scrollTo(0, 0);
}

function renderPage(page) {
  loadData();
  switch(page) {
    case 'dashboard': renderDashboard(); break;
    case 'settings': renderSettings(); break;
    case 'products': renderProducts(); break;
    case 'categories': renderCategories(); break;
    case 'contacts': renderContacts(); break;
    case 'announcements': renderAnnouncements(); break;
    case 'promo': renderPromo(); break;
  }
}

async function handleLogoUpload(input) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];
  if (file.size > 2 * 1024 * 1024) {
    showToast('حجم الصورة كبير جداً (الحد الأقصى 2 ميجابايت)', 'error');
    return;
  }
  try {
    const base64 = await fileToBase64(file);
    appData.settings.logo = base64;
    saveData();
    showToast('تم رفع اللوجو بنجاح');
    renderSettings();
  } catch (e) {
    showToast('خطأ في رفع اللوجو', 'error');
  }
}

function removeLogo() {
  appData.settings.logo = null;
  saveData();
  showToast('تم إزالة اللوجو');
  renderSettings();
}

function saveSettings() {
  appData.settings.siteName = document.getElementById('settingSiteNameAr').value;
  appData.settings.siteNameEn = document.getElementById('settingSiteNameEn').value;
  appData.settings.defaultTheme = document.getElementById('settingTheme').checked ? 'dark' : 'light';
  saveData();
  showToast('تم حفظ الإعدادات بنجاح');
}

async function handleProductImageUpload(input) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];
  if (file.size > 2 * 1024 * 1024) {
    showToast('حجم الصورة كبير جداً', 'error');
    return;
  }
  try {
    const base64 = await fileToBase64(file);
    document.getElementById('prodImageUrl').value = base64;
    const preview = document.getElementById('prodImagePreview');
    preview.src = base64;
    preview.style.display = 'block';
    document.getElementById('prodNoImage').style.display = 'none';
  } catch (e) {
    showToast('خطأ في رفع الصورة', 'error');
  }
}

function saveProduct(existingId, isEdit) {
  const name = document.getElementById('prodName').value.trim();
  const category = document.getElementById('prodCategory').value;
  const price = parseInt(document.getElementById('prodPrice').value);
  const origPrice = document.getElementById('prodOrigPrice').value ? parseInt(document.getElementById('prodOrigPrice').value) : null;
  const image = document.getElementById('prodImageUrl').value.trim();

  if (!name) { showToast('يرجى إدخال اسم المنتج', 'error'); return; }
  if (!price || price <= 0) { showToast('يرجى إدخال سعر صحيح', 'error'); return; }

  if (isEdit) {
    const idx = appData.products.findIndex(p => p.id === existingId);
    if (idx !== -1) {
      appData.products[idx] = { ...appData.products[idx], name, category, price, image };
      if (origPrice) appData.products[idx].originalPrice = origPrice;
      else delete appData.products[idx].originalPrice;
    }
    showToast('تم تعديل المنتج بنجاح');
  } else {
    appData.products.push({ id: generateId(), name, category, price, originalPrice: origPrice, image });
    showToast('تم إضافة المنتج بنجاح');
  }
  saveData();
  closeModal();
  renderProducts();
}

function deleteProduct(id) {
  const product = appData.products.find(p => p.id === id);
  showConfirmModal(`هل أنت متأكد من حذف المنتج "${product ? product.name : ''}"؟`, () => {
    appData.products = appData.products.filter(p => p.id !== id);
    saveData();
    showToast('تم حذف المنتج');
    renderProducts();
  });
}

}

function saveCategory(existingId, isEdit) {
  const titleAr = document.getElementById('catTitleAr').value.trim();
  const titleEn = document.getElementById('catTitleEn').value.trim().toUpperCase();
  const descriptionAr = document.getElementById('catDescAr').value.trim();
  let catId = document.getElementById('catId').value.trim().toLowerCase().replace(/\s+/g, '-');
  const image = document.getElementById('catImageUrl').value.trim();

  if (!titleAr) { showToast('يرجى إدخال الاسم بالعربي', 'error'); return; }
  if (!titleEn) { showToast('يرجى إدخال الاسم بالإنجليزي', 'error'); return; }
  if (!isEdit && !catId) { catId = titleEn.toLowerCase().replace(/\s+/g, '-'); }
  if (!catId) { showToast('يرجى إدخال المعرّف', 'error'); return; }

  if (isEdit) {
    const idx = appData.categories.findIndex(c => c.id === existingId);
    if (idx !== -1) {
      appData.categories[idx] = { ...appData.categories[idx], titleAr, titleEn, descriptionAr, image };
    }
    showToast('تم تعديل المجموعة بنجاح');
  } else {
    if (appData.categories.find(c => c.id === catId)) { showToast('هذا المعرّف موجود بالفعل', 'error'); return; }
    appData.categories.push({ id: catId, titleAr, titleEn, descriptionAr, image });
    showToast('تم إضافة المجموعة بنجاح');
  }
  saveData();
  closeModal();
  renderCategories();
}

function deleteCategory(id) {
  const cat = appData.categories.find(c => c.id === id);
  const productCount = appData.products.filter(p => p.category === id).length;
  showConfirmModal(`هل أنت متأكد من حذف مجموعة "${cat ? cat.titleAr : ''}"؟${productCount > 0 ? ` (تحتوي على ${productCount} منتج)` : ''}`, () => {
    appData.categories = appData.categories.filter(c => c.id !== id);
    saveData();
    showToast('تم حذف المجموعة');
    renderCategories();
  });
}

      facebook: '<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>',
      other: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
    };
    return icons[type] || icons.other;
  }

  document.getElementById('page-contacts').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:28px;">
      <div>
        <h1 style="font-size:24px;font-weight:800;margin-bottom:4px;">إدارة وسائل التواصل</h1>
        <p style="color:var(--text-muted);font-size:14px;">${d.contacts.length} وسيلة تواصل</p>
      </div>
      <button class="btn-gold" onclick="openContactModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        إضافة وسيلة
      </button>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;">
      ${d.contacts.map(c => `
        <div class="admin-card" style="padding:20px;display:flex;align-items:center;gap:16px;">
          <div style="width:48px;height:48px;border-radius:12px;background:${c.color || 'var(--bg-tertiary)'};display:flex;align-items:center;justify-content:center;flex-shrink:0;color:${c.color === '#ffffff' || c.color === '#FFFFFF' || c.color === '#fff' ? 'var(--bg-primary)' : c.color === '#000000' ? 'var(--text-primary)' : c.color};">
            ${getContactIcon(c.type)}
          </div>
          <div style="flex:1;min-width:0;">
            <h3 style="font-size:15px;font-weight:700;margin-bottom:2px;">${c.platform}</h3>
            <p style="color:var(--text-secondary);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${c.handle}</p>
            <a href="${c.link}" target="_blank" style="font-size:11px;color:var(--gold);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;">${c.link}</a>
          </div>
          <div style="display:flex;gap:4px;flex-shrink:0;">
            <button class="btn-icon" onclick='openContactModal(${JSON.stringify(c).replace(/'/g,"&#39;")})' title="تعديل">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="btn-icon danger" onclick="deleteContact('${c.id}')" title="حذف">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
            </button>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function openContactModal(contact) {
  const isEdit = !!contact;
  const c = contact || { platform: '', handle: '', link: '', color: '#e2b04a', type: 'other', id: '' };

  showModal(`
    <h3 style="font-size:18px;font-weight:700;margin-bottom:24px;">${isEdit ? 'تعديل وسيلة التواصل' : 'إضافة وسيلة تواصل'}</h3>
    <div style="display:flex;flex-direction:column;gap:16px;">
      <div>
        <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px;">اسم المنصة</label>
        <input type="text" id="contactPlatform" class="admin-input" value="${c.platform}" placeholder="واتساب، انستجرام، تيك توك...">
      </div>
      <div>
        <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px;">الحساب / الرقم</label>
        <input type="text" id="contactHandle" class="admin-input" value="${c.handle}" placeholder="@username أو رقم الهاتف">
      </div>
      <div>
        <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px;">رابط التواصل</label>
        <input type="text" id="contactLink" class="admin-input" value="${c.link}" placeholder="https://..." dir="ltr">
      </div>
      <div>
        <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px;">النوع</label>
        <select id="contactType" class="admin-select">
          <option value="whatsapp" ${c.type === 'whatsapp' ? 'selected' : ''}>واتساب</option>
          <option value="instagram" ${c.type === 'instagram' ? 'selected' : ''}>انستجرام</option>
          <option value="tiktok" ${c.type === 'tiktok' ? 'selected' : ''}>تيك توك</option>
          <option value="facebook" ${c.type === 'facebook' ? 'selected' : ''}>فيسبوك</option>
          <option value="phone" ${c.type === 'phone' ? 'selected' : ''}>هاتف</option>
          <option value="email" ${c.type === 'email' ? 'selected' : ''}>بريد إلكتروني</option>
          <option value="other" ${c.type === 'other' ? 'selected' : ''}>أخرى</option>
        </select>
      </div>
      <div>
        <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px;">اللون</label>
        <div style="display:flex;align-items:center;gap:12px;">
          <input type="color" id="contactColor" value="${c.color || '#e2b04a'}">
          <span id="contactColorValue" style="color:var(--text-secondary);font-size:13px;font-family:monospace;">${c.color || '#e2b04a'}</span>
        </div>
      </div>
      <div style="display:flex;gap:12px;justify-content:flex-start;margin-top:8px;">
        <button class="btn-gold" onclick="saveContact('${c.id || ''}', ${isEdit})">${isEdit ? 'حفظ التعديلات' : 'إضافة'}</button>
        <button class="btn-outline" onclick="closeModal()">إلغاء</button>
      </div>
    </div>
  `);
  document.getElementById('contactColor').addEventListener('input', function() {
    document.getElementById('contactColorValue').textContent = this.value;
  });
}

function saveContact(existingId, isEdit) {
  const platform = document.getElementById('contactPlatform').value.trim();
  const handle = document.getElementById('contactHandle').value.trim();
  const link = document.getElementById('contactLink').value.trim();
  const type = document.getElementById('contactType').value;
  const color = document.getElementById('contactColor').value;

  if (!platform) { showToast('يرجى إدخال اسم المنصة', 'error'); return; }

  if (isEdit) {
    const idx = appData.contacts.findIndex(c => c.id === existingId);
    if (idx !== -1) {
      appData.contacts[idx] = { ...appData.contacts[idx], platform, handle, link, type, color };
    }
    showToast('تم تعديل وسيلة التواصل بنجاح');
  } else {
    appData.contacts.push({ id: generateId(), platform, handle, link, type, color });
    showToast('تم إضافة وسيلة التواصل بنجاح');
  }
  saveData();
  closeModal();
  renderContacts();
}

function deleteContact(id) {
  const contact = appData.contacts.find(c => c.id === id);
  showConfirmModal(`هل أنت متأكد من حذف "${contact ? contact.platform : ''}"؟`, () => {
    appData.contacts = appData.contacts.filter(c => c.id !== id);
    saveData();
    showToast('تم حذف وسيلة التواصل');
    renderContacts();
  });
}

// ==================== ANNOUNCEMENTS ====================
function renderAnnouncements() {
  const d = appData;
  const announcements = d.announcements || [];

  document.getElementById('page-announcements').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:28px;">
      <div>
        <h1 style="font-size:24px;font-weight:800;margin-bottom:4px;">إدارة الإعلانات</h1>
        <p style="color:var(--text-muted);font-size:14px;">${announcements.length} إعلان</p>
      </div>
      <button class="btn-gold" onclick="openAnnouncementModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        إضافة إعلان
      </button>
    </div>

    ${announcements.length === 0 ? `
      <div class="admin-card" style="padding:60px;text-align:center;">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 16px;display:block;"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        <p style="color:var(--text-muted);font-size:15px;">لا توجد إعلانات حالياً</p>
      </div>
    ` : `
      <div style="display:flex;flex-direction:column;gap:12px;">
        ${announcements.map((a, idx) => `
          <div class="admin-card" style="padding:20px;">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;">
              <div style="flex:1;min-width:200px;">
                <p style="font-size:15px;font-weight:500;margin-bottom:6px;">${a.text}</p>
                <div style="display:flex;align-items:center;gap:12px;">
                  <span class="badge ${a.active ? 'badge-green' : 'badge-gray'}">${a.active ? 'نشط' : 'غير نشط'}</span>
                  <span style="color:var(--text-muted);font-size:12px;">${a.createdAt ? new Date(a.createdAt).toLocaleDateString('ar-EG') : ''}</span>
                </div>
              </div>
              <div style="display:flex;align-items:center;gap:8px;">
                <label class="toggle-switch" title="تفعيل/تعطيل">
                  <input type="checkbox" ${a.active ? 'checked' : ''} onchange="toggleAnnouncement('${a.id}')">
                  <span class="toggle-slider"></span>
                </label>
                <button class="btn-icon" onclick='openAnnouncementModal(${JSON.stringify(a).replace(/'/g,"&#39;")})' title="تعديل">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </button>
                <button class="btn-icon danger" onclick="deleteAnnouncement('${a.id}')" title="حذف">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                </button>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    `}
  `;
}

function openAnnouncementModal(announcement) {
  const isEdit = !!announcement;
  const a = announcement || { text: '', active: true, id: '', createdAt: '' };

  showModal(`
    <h3 style="font-size:18px;font-weight:700;margin-bottom:24px;">${isEdit ? 'تعديل الإعلان' : 'إضافة إعلان جديد'}</h3>
    <div style="display:flex;flex-direction:column;gap:16px;">
      <div>
        <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px;">نص الإعلان</label>
        <textarea id="annText" class="admin-textarea" rows="4" placeholder="نص الإعلان هنا...">${a.text}</textarea>
      </div>
      <div>
        <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px;">الحالة</label>
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-size:14px;color:var(--text-secondary);">غير نشط</span>
          <label class="toggle-switch">
            <input type="checkbox" id="annActive" ${a.active ? 'checked' : ''}>
            <span class="toggle-slider"></span>
          </label>
          <span style="font-size:14px;color:var(--text-secondary);">نشط</span>
        </div>
      </div>
      <div style="display:flex;gap:12px;justify-content:flex-start;margin-top:8px;">
        <button class="btn-gold" onclick="saveAnnouncement('${a.id || ''}', ${isEdit})">${isEdit ? 'حفظ التعديلات' : 'إضافة الإعلان'}</button>
        <button class="btn-outline" onclick="closeModal()">إلغاء</button>
      </div>
    </div>
  `);
}

function saveAnnouncement(existingId, isEdit) {
  const text = document.getElementById('annText').value.trim();
  const active = document.getElementById('annActive').checked;

  if (!text) { showToast('يرجى إدخال نص الإعلان', 'error'); return; }

  if (isEdit) {
    const idx = appData.announcements.findIndex(a => a.id === existingId);
    if (idx !== -1) {
      appData.announcements[idx] = { ...appData.announcements[idx], text, active };
    }
    showToast('تم تعديل الإعلان بنجاح');
  } else {
    appData.announcements.push({ id: generateId(), text, active, createdAt: new Date().toISOString() });
    showToast('تم إضافة الإعلان بنجاح');
  }
  saveData();
  closeModal();
  renderAnnouncements();
}

function toggleAnnouncement(id) {
  const idx = appData.announcements.findIndex(a => a.id === id);
  if (idx !== -1) {
    appData.announcements[idx].active = !appData.announcements[idx].active;
    saveData();
    showToast(appData.announcements[idx].active ? 'تم تفعيل الإعلان' : 'تم تعطيل الإعلان');
    renderAnnouncements();
  }
}

function deleteAnnouncement(id) {
  showConfirmModal('هل أنت متأكد من حذف هذا الإعلان؟', () => {
    appData.announcements = appData.announcements.filter(a => a.id !== id);
    saveData();
    showToast('تم حذف الإعلان');
    renderAnnouncements();
  });
}

// ==================== PROMO BANNER ====================
function renderPromo() {
  const d = appData;
  const banner = d.promoBanner || { text: '', active: false };

  document.getElementById('page-promo').innerHTML = `
    <div style="margin-bottom:28px;">
      <h1 style="font-size:24px;font-weight:800;margin-bottom:4px;">شريط العروض</h1>
      <p style="color:var(--text-muted);font-size:14px;">إدارة شريط العروض المتحرك</p>
    </div>

    <div class="admin-card" style="padding:28px;max-width:640px;">
      <!-- Active Toggle -->
      <div style="margin-bottom:24px;">
        <label style="display:block;font-size:14px;font-weight:600;margin-bottom:12px;">حالة الشريط</label>
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-size:14px;color:${!banner.active ? 'var(--text-primary)' : 'var(--text-muted)'}">معطل</span>
          <label class="toggle-switch">
            <input type="checkbox" id="promoActive" ${banner.active ? 'checked' : ''} onchange="updatePromoPreview()">
            <span class="toggle-slider"></span>
          </label>
          <span style="font-size:14px;color:${banner.active ? 'var(--text-primary)' : 'var(--text-muted)'}">مفعّل</span>
        </div>
      </div>

      <!-- Banner Text -->
      <div style="margin-bottom:24px;">
        <label style="display:block;font-size:14px;font-weight:600;margin-bottom:6px;">نص الشريط</label>
        <textarea id="promoText" class="admin-textarea" rows="3" placeholder="نص العرض أو التخفيض..." oninput="updatePromoPreview()">${banner.text || ''}</textarea>
      </div>

      <!-- Preview -->
      <div style="margin-bottom:24px;">
        <label style="display:block;font-size:14px;font-weight:600;margin-bottom:12px;">معاينة</label>
        <div id="promoPreviewContainer" style="border-radius:8px;overflow:hidden;${!banner.active ? 'opacity:0.4;pointer-events:none;' : ''}">
          <div class="promo-preview">
            <div class="promo-preview-text" style="padding:0 40px;font-size:15px;">
              ${banner.text || 'نص العرض هنا...'} &nbsp;&nbsp;&nbsp;&nbsp; ★ &nbsp;&nbsp;&nbsp;&nbsp; ${banner.text || 'نص العرض هنا...'}
            </div>
          </div>
        </div>
      </div>

      <!-- Save -->
      <button class="btn-gold" onclick="savePromo()" style="padding:12px 32px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        حفظ التغييرات
      </button>
    </div>
  `;
}

function updatePromoPreview() {
  const text = document.getElementById('promoText').value;
  const active = document.getElementById('promoActive').checked;
  const previewText = document.querySelector('.promo-preview-text');
  const container = document.getElementById('promoPreviewContainer');

  if (previewText) {
    previewText.innerHTML = (text || 'نص العرض هنا...') + ' &nbsp;&nbsp;&nbsp;&nbsp; ★ &nbsp;&nbsp;&nbsp;&nbsp; ' + (text || 'نص العرض هنا...');
  }
  if (container) {
    container.style.opacity = active ? '1' : '0.4';
    container.style.pointerEvents = active ? 'auto' : 'none';
  }
}

function savePromo() {
  const text = document.getElementById('promoText').value.trim();
  const active = document.getElementById('promoActive').checked;

  appData.promoBanner = { text, active };
  saveData();
  showToast('تم حفظ شريط العروض بنجاح');
}

// ==================== INIT ====================
function showAdminPanel() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'block';
  loadData();
  navigateTo('dashboard');
  handleResponsive();
}

function handleResponsive() {
  const mainContent = document.getElementById('mainContent');
  const topBar = document.getElementById('topBar');
  const sidebar = document.getElementById('sidebar');

  function check() {
    if (window.innerWidth <= 768) {
      mainContent.style.marginRight = '0';
      topBar.style.display = 'block';
      sidebar.classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('show');
    } else {
      mainContent.style.marginRight = '260px';
      topBar.style.display = 'none';
      sidebar.classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('show');
    }
  }
  check();
  window.addEventListener('resize', check);
}

// Boot
(function init() {
  loadData();
  if (checkAuth()) {
    showAdminPanel();
  }
})();
</script>
